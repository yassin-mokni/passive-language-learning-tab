<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passive Language Learning</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <div class="flag">
      <svg width="36" height="36" viewBox="0 0 48 48">
        <circle cx="24" cy="24" r="24" fill="#fff" />
        <g clip-path="url(#circleClip)">
          <rect x="0" y="0" width="48" height="16" fill="#000" />
          <rect x="0" y="16" width="48" height="16" fill="#DD0000" />
          <rect x="0" y="32" width="48" height="16" fill="#FFCE00" />
        </g>
        <defs>
          <clipPath id="circleClip">
            <circle cx="24" cy="24" r="23" />
          </clipPath>
        </defs>
      </svg>
    </div>

    <div class="top-controls">
      <button class="translation-toggle" id="translationToggle" data-tooltip="Toggle translation">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="m5 8 6 6"></path>
          <path d="m4 14 6-6 2-3"></path>
          <path d="M2 5h12"></path>
          <path d="M7 2h1"></path>
          <path d="m22 22-5-10-5 10"></path>
          <path d="M14 18h6"></path>
        </svg>
      </button>

      <div class="topic-selector">
        <select id="topicSelect" class="topic-dropdown">
          <option value="all">All Topics</option>
          <option value="everyday">Everyday Life</option>
          <option value="social">Social</option>
          <option value="food">Food & Dining</option>
          <option value="travel">Travel</option>
          <option value="shopping">Shopping</option>
          <option value="housing">Housing</option>
          <option value="work">Work & Business</option>
          <option value="health">Health</option>
          <option value="slang">Slang</option>
        </select>
      </div>

      <div class="level-selector">
        <button class="level-btn" data-level="A0">A0</button>
        <button class="level-btn active" data-level="A1">A1</button>
        <button class="level-btn" data-level="A2">A2</button>
        <button class="level-btn" data-level="B1">B1</button>
        <button class="level-btn" data-level="B2">B2</button>
        <button class="level-btn" data-level="C1">C1</button>
        <button class="level-btn" data-level="C2">C2</button>
      </div>
    </div>

    <div class="phrase-container">
      <div class="phrase-with-audio">
        <div class="german-phrase" id="germanPhrase"></div>
        <button class="audio-btn" id="audioBtn" data-tooltip="Listen to pronunciation">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </button>
      </div>
      <div class="english-translation" id="englishTranslation"></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="favoriteBtn" data-tooltip="Favorite">★</button>
      <button class="control-btn" id="nextBtn" data-tooltip="Next phrase">↻</button>
    </div>

    <button class="favorites-trigger" id="favoritesBtn">Favorites</button>

    <button class="shortcuts-help" id="shortcutsBtn" data-tooltip="Keyboard shortcuts">?</button>

    <button class="radio-trigger" id="radioBtn" data-tooltip="German Radio">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"></path>
        <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"></path>
        <circle cx="12" cy="12" r="2"></circle>
        <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"></path>
        <path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"></path>
      </svg>
    </button>

    <a href="https://buymeacoffee.com/yassinbuilds" target="_blank" class="support-btn" id="supportBtn"
      data-tooltip="Buy me a coffee">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 8h1a4 4 0 1 1 0 8h-1"></path>
        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"></path>
        <line x1="6" y1="2" x2="6" y2="4"></line>
        <line x1="10" y1="2" x2="10" y2="4"></line>
        <line x1="14" y1="2" x2="14" y2="4"></line>
      </svg>
    </a>

    <button class="dark-mode-toggle" id="darkModeToggle" data-tooltip="Toggle dark mode">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <div class="shortcuts-modal" id="shortcutsModal">
      <div class="shortcuts-content">
        <h3>Keyboard Shortcuts</h3>
        <div class="shortcut-list">
          <div class="shortcut-item">
            <kbd>Space</kbd>
            <span>Next phrase</span>
          </div>
          <div class="shortcut-item">
            <kbd>F</kbd>
            <span>Toggle favorite</span>
          </div>
          <div class="shortcut-item">
            <kbd>A</kbd>
            <span>Play audio</span>
          </div>
          <div class="shortcut-item">
            <kbd>T</kbd>
            <span>Toggle translation</span>
          </div>
          <div class="shortcut-item">
            <kbd>R</kbd>
            <span>Play/Pause radio</span>
          </div>
          <div class="shortcut-item">
            <kbd>←</kbd> / <kbd>→</kbd>
            <span>Previous/Next station</span>
          </div>
        </div>
      </div>
    </div>

    <div class="favorites-popover" id="favoritesPopover">
      <div class="favorites-header">
        <span class="favorites-title">Favorites</span>
        <button class="export-btn" id="exportBtn" data-tooltip="Export favorites">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
      </div>
      <div class="favorites-content" id="favoritesContent"></div>
    </div>

    <div class="radio-popover" id="radioPopover">
      <div class="radio-header">
        <span class="radio-title">German Radio</span>
        <div class="radio-animation" id="radioAnimation">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
      <div class="radio-content">
        <select id="radioStationSelect" class="radio-dropdown">
          <optgroup label="Learners (Clearer/Conversational)">
            <option value="dlf_nova">Deutschlandfunk Nova</option>
            <option value="dlf_kultur">Deutschlandfunk Kultur</option>
          </optgroup>
          <optgroup label="Advanced (News/Talk)">
            <option value="dlf">Deutschlandfunk</option>
            <option value="wdr5">WDR 5</option>
            <option value="br24">BR24</option>
            <option value="ndr_info">NDR Info</option>
          </optgroup>
        </select>
        <div class="radio-controls">
          <div class="radio-playback-controls">
            <button class="radio-control-btn" id="radioPrevBtn" data-tooltip="Previous station">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="19 20 9 12 19 4 19 20"></polygon>
                <line x1="5" y1="19" x2="5" y2="5"></line>
              </svg>
            </button>
            <button class="radio-play-btn" id="radioPlayBtn">
              <svg class="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
              <svg class="pause-icon hidden" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
              </svg>
            </button>
            <button class="radio-control-btn" id="radioNextBtn" data-tooltip="Next station">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 4 15 12 5 20 5 4"></polygon>
                <line x1="19" y1="5" x2="19" y2="19"></line>
              </svg>
            </button>
          </div>
          <div class="radio-volume-container">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            </svg>
            <input type="range" id="radioVolume" class="radio-volume" min="0" max="1" step="0.01" value="0.5">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>

</html>
