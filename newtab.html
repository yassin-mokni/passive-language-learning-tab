<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passive Language Learning</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="flag">🇩🇪</div>
    
    <div class="top-controls">
      <button class="translation-toggle" id="translationToggle" data-tooltip="Toggle translation">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m5 8 6 6"></path>
          <path d="m4 14 6-6 2-3"></path>
          <path d="M2 5h12"></path>
          <path d="M7 2h1"></path>
          <path d="m22 22-5-10-5 10"></path>
          <path d="M14 18h6"></path>
        </svg>
      </button>
      
      <div class="topic-selector">
        <select id="topicSelect" class="topic-dropdown">
          <option value="all">All Topics</option>
          <option value="everyday">Everyday Life</option>
          <option value="social">Social</option>
          <option value="food">Food & Dining</option>
          <option value="travel">Travel</option>
          <option value="shopping">Shopping</option>
          <option value="housing">Housing</option>
          <option value="work">Work & Business</option>
          <option value="health">Health</option>
          <option value="slang">Slang</option>
        </select>
      </div>
      
      <div class="level-selector">
      <button class="level-btn" data-level="A0">A0</button>
      <button class="level-btn active" data-level="A1">A1</button>
      <button class="level-btn" data-level="A2">A2</button>
      <button class="level-btn" data-level="B1">B1</button>
      <button class="level-btn" data-level="B2">B2</button>
      <button class="level-btn" data-level="C1">C1</button>
      <button class="level-btn" data-level="C2">C2</button>
    </div>
    </div>

    <div class="phrase-container">
      <div class="phrase-with-audio">
        <div class="german-phrase" id="germanPhrase"></div>
        <button class="audio-btn" id="audioBtn" data-tooltip="Listen to pronunciation">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          </svg>
        </button>
      </div>
      <div class="english-translation" id="englishTranslation"></div>
    </div>

    <div class="controls">
      <button class="control-btn" id="favoriteBtn" data-tooltip="Favorite">★</button>
      <button class="control-btn" id="nextBtn" data-tooltip="Next phrase">↻</button>
    </div>

    <button class="favorites-trigger" id="favoritesBtn">Favorites</button>

    <button class="shortcuts-help" id="shortcutsBtn" data-tooltip="Keyboard shortcuts">?</button>

    <div class="shortcuts-modal" id="shortcutsModal">
      <div class="shortcuts-content">
        <h3>Keyboard Shortcuts</h3>
        <div class="shortcut-list">
          <div class="shortcut-item">
            <kbd>Space</kbd>
            <span>Next phrase</span>
          </div>
          <div class="shortcut-item">
            <kbd>F</kbd>
            <span>Toggle favorite</span>
          </div>
          <div class="shortcut-item">
            <kbd>A</kbd>
            <span>Play audio</span>
          </div>
          <div class="shortcut-item">
            <kbd>T</kbd>
            <span>Toggle translation</span>
          </div>
        </div>
      </div>
    </div>

    <div class="favorites-popover" id="favoritesPopover">
      <div class="favorites-content" id="favoritesContent"></div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
